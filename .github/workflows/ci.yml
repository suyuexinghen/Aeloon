name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff==0.15.6"

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .
