name: Feature Request
description: Got an idea? Let's hear it.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, check if a similar request already exists. If it does, leave a 👍 on it instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or limitation you're running into.
      placeholder: "Currently there's no way to... which means I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work?
      placeholder: "It would be great if Aeloon could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you thought about?

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Core agent / runtime
        - CLI
        - Channel integration (Telegram, Slack, etc.)
        - WhatsApp bridge
        - Skills / tools
        - Configuration / onboarding
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, examples, links, or anything else that helps paint the picture.
