name: Bug Report
description: Something broke. Let's fix it.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Fill in as much as you can — the more context, the faster we can fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `aeloon agent -m 'hello'`, it crashes with..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected it to reply with a greeting."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `aeloon onboard`
        2. Edit config to use model X
        3. Run `aeloon agent -m "hello"`
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste any relevant logs or stack traces.
      render: shell

  - type: input
    id: version
    attributes:
      label: Aeloon version
      placeholder: "1.0.0  (run: pip show aeloon-ai)"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.2 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Additional context, related issues, suspected cause, etc.
